<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANIS 2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #001a3a 0%, transparent 60%),
                  radial-gradient(ellipse at 60% 80%, #0a1a00 0%, transparent 60%);
      z-index: 0;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(150, 100, 255, 0.6);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
    }

    .logo {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #a855f7, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.4));
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.3)); }
      50%       { filter: drop-shadow(0 0 60px rgba(168, 85, 247, 0.7)); }
    }

    .version {
      font-size: 1rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #6366f1;
      margin-top: -0.5rem;
      margin-bottom: 2.5rem;
      opacity: 0.8;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: #94a3b8;
      max-width: 560px;
      margin: 0 auto 3rem;
      line-height: 1.7;
    }

    .tagline span {
      color: #c084fc;
      font-weight: 600;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.6);
    }

    .stats {
      display: flex;
      gap: 3rem;
      justify-content: center;
      margin-top: 4rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #475569;
      margin-top: 0.25rem;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="badge">✦ Nouvelle génération</div>
    <div class="logo">ANIS</div>
    <div class="version">Version 2.0</div>
    <p class="tagline">
      Une expérience <span>nouvelle génération</span>.<br/>
      Conçu pour aller plus loin, plus vite, plus haut.
    </p>
    <a href="#" class="btn">Découvrir →</a>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">2.0</div>
        <div class="stat-label">Version</div>
      </div>
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">Possibilités</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">Dédicace</div>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
      p.style.opacity = (0.3 + Math.random() * 0.7).toString();
      container.appendChild(p);
    }
  </script>
</body>
</html>
